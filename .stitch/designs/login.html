<style>
        body {
            background-color: #0D0A08;
            color: #e9e1dc;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            background-color: #1C1512;
            border: 1px solid #7C4F34;
        }
        .input-field {
            background-color: #161310;
            border-color: #4f4537;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #d4a04a;
            box-shadow: 0 0 0 2px rgba(212, 160, 74, 0.2);
            outline: none;
        }
        .btn-primary {
            background-color: #d4a04a;
            color: #161310;
            transition: transform 0.2s ease, opacity 0.3s ease;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .atmospheric-glow {
            background: radial-gradient(circle at center, rgba(212, 160, 74, 0.05) 0%, transparent 70%);
        }
    </style>

<body class="font-body text-body min-h-[100dvh] flex flex-col justify-between overflow-x-hidden">
<!-- Subtle atmospheric background -->
<div class="fixed inset-0 pointer-events-none atmospheric-glow z-0"></div>
<!-- Header / Brand Section -->
<header class="w-full h-20 flex items-center justify-center relative z-10">
<div class="flex items-center gap-3">
<img alt="Roast &amp; Ritual Logo" class="h-10 w-auto" src="https://lh3.googleusercontent.com/aida/AP1WRLuMbavASvYkuWy9MRdKiTxZLU7OCLVk43Qc7ZaOaeIPft2FwukUSokd8RgN3QOyZur4oEE1OmXSvBA75v_hEsTxcgD90Aw6fEsasc6PfQSiwU1cnxJDpgH1aroBnDUbV__MLVZBdX4DQMHDPtfH7wHBTz_BwzqFmwmCUk-_la665IP7Wnv4tdws4-4_E0R2PzXrYscYvTSLFYDIsYmfwdQCJHitbOta0mXJ3gi-XSvW97Ju2Vg3qWANAOw"/>
<span class="font-display text-h2 font-extrabold text-primary tracking-tight">Roast &amp; Ritual</span>
</div>
</header>
<!-- Main Content: Login Journey -->
<main class="flex-grow flex items-center justify-center px-container-padding relative z-10 py-12">
<div class="w-full max-w-md">
<div class="login-card p-8 md:p-10 rounded-xl shadow-2xl">
<div class="text-center mb-10">
<h1 class="font-display text-h1 text-on-surface mb-2">Welcome Back</h1>
<p class="font-small text-small text-on-surface-variant">Enter your credentials to access your ritual.</p>
</div>
<form class="space-y-6" id="loginForm">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-small text-small text-on-surface-variant block uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<input class="input-field w-full px-4 py-3 rounded-lg text-on-surface placeholder-on-surface-variant/30" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center text-on-surface-variant/50">
<span class="material-symbols-outlined text-[20px]">alternate_email</span>
</div>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-small text-small text-on-surface-variant block uppercase tracking-wider" for="password">Password</label>
<a class="font-small text-small text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="input-field w-full px-4 py-3 rounded-lg text-on-surface placeholder-on-surface-variant/30" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<div class="pt-4">
<button class="btn-primary w-full py-4 rounded-lg font-display text-body font-bold uppercase tracking-widest hover:opacity-90" type="submit">
                            Sign In
                        </button>
</div>
</form>
<!-- Alternative Action -->
<div class="mt-8 text-center pt-6 border-t border-outline-variant/30">
<p class="font-small text-small text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline transition-all ml-1" href="#">Register</a>
</p>
</div>
</div>
<!-- Social/Minimalist Footer Note -->
<div class="mt-8 flex justify-center gap-6 text-on-surface-variant/40">
<span class="material-symbols-outlined cursor-pointer hover:text-primary transition-colors">brand_awareness</span>
<span class="material-symbols-outlined cursor-pointer hover:text-primary transition-colors">star</span>
<span class="material-symbols-outlined cursor-pointer hover:text-primary transition-colors">coffee</span>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-8 border-t border-outline-variant relative z-10 bg-surface-container-lowest">
<div class="max-w-max-width mx-auto px-container-padding flex flex-col md:flex-row justify-between items-center gap-4">
<p class="font-small text-small text-on-surface-variant opacity-80">
                © 2026 Roast &amp; Ritual. Crafted for the artisanal palate.
            </p>
<div class="flex gap-6">
<a class="font-small text-small text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-small text-small text-on-surface-variant hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-small text-small text-on-surface-variant hover:text-primary transition-colors" href="#">Help</a>
</div>
</div>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        // Simple interaction for the login form
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.disabled = true;
            
            // Artificial delay to simulate ritual
            setTimeout(() => {
                btn.innerHTML = 'Authenticated';
                btn.classList.replace('btn-primary', 'bg-tertiary-container');
                setTimeout(() => {
                    alert('Brewing your dashboard...');
                }, 500);
            }, 1500);
        });
    </script>
</body></html>
